<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winter's Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="logo"><span class="logo-accent">Winter's</span> Job Tracker</h1>
      </div>
      <nav class="nav">
        <a href="#dashboard" class="nav-pill active" data-view="dashboard">
          <i data-lucide="layout-dashboard" class="nav-icon"></i>
          Dashboard
        </a>
        <a href="#applications" class="nav-pill" data-view="applications">
          <i data-lucide="table-2" class="nav-icon"></i>
          Applications
        </a>
        <a href="#analytics" class="nav-pill" data-view="analytics">
          <i data-lucide="bar-chart-3" class="nav-icon"></i>
          Analytics
        </a>
      </nav>
      <div class="header-right">
        <button class="btn btn-primary" id="btn-add-app">
          <i data-lucide="plus" class="btn-icon"></i>
          Add Application
        </button>
        <button class="btn btn-ghost btn-icon-only" id="btn-settings" title="Settings">
          <i data-lucide="settings"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="main-content">
    <!-- Views are rendered here by JS -->
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <!-- Modal content injected by JS -->
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
